version: '3'

tasks:
  release:update-readme:
    desc: Update README dependency examples to the requested release version.
    requires:
      vars: [VERSION]
    cmds:
      - |
        perl -0pi -e 's/(dev\.turingcomplete:kotlin-onetimepassword:)[0-9]+\.[0-9]+\.[0-9]+/${1}{{.VERSION}}/g;
                      s|(<version>)[0-9]+\.[0-9]+\.[0-9]+(</version>)|${1}{{.VERSION}}${2}|g' README.md

  release:check:
    desc: Verify that the requested release version matches Gradle, README, and the changelog.
    requires:
      vars: [VERSION]
    cmds:
      - test "$(./gradlew -q printVersion)" = "{{.VERSION}}"
      - rg -F "dev.turingcomplete:kotlin-onetimepassword:{{.VERSION}}" README.md
      - rg -F "<version>{{.VERSION}}</version>" README.md
      - |
        awk -v version="{{.VERSION}}" '
          $0 ~ "^## \\[" version "\\]" {
            found = 1
            exit
          }
          END {
            exit found ? 0 : 1
          }
        ' CHANGELOG.md
      - ./gradlew releaseCheck

  release:tag:
    desc: Tag the reviewed main release commit and push the tag.
    requires:
      vars: [VERSION]
    cmds:
      - git checkout main
      - git pull --ff-only origin main
      - task: release:check
        vars:
          VERSION: '{{.VERSION}}'
      - test -z "$(git tag --list "v{{.VERSION}}")"
      - git tag "v{{.VERSION}}"
      - git push origin "v{{.VERSION}}"

  release:publish:
    desc: Publish the requested release version to Sonatype from the local machine.
    requires:
      vars: [VERSION]
    cmds:
      - task: release:check
        vars:
          VERSION: '{{.VERSION}}'
      - ./gradlew publishMavenJavaPublicationToSonatypeRepository -Psigning.required=true

  release:
    desc: Publish locally, then tag and push the reviewed main release commit.
    requires:
      vars: [VERSION]
    cmds:
      - task: release:publish
        vars:
          VERSION: '{{.VERSION}}'
      - task: release:tag
        vars:
          VERSION: '{{.VERSION}}'
